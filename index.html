<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Note — Rich Editor</title>
    <style>
        :root { --accent: #007bff; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            max-width: 750px;
            margin: 0 auto;
            padding: 60px 20px;
            color: #333;
        }
        [contenteditable]:focus { outline: none; }
        #title {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 20px;
            border: none;
        }
        #content {
            font-size: 20px;
            min-height: 400px;
            line-height: 1.6;
        }
        #title:empty::before, #content:empty::before {
            content: attr(data-placeholder);
            color: #ccc;
        }
        .toolbar {
            position: absolute;
            background: #222;
            border-radius: 5px;
            padding: 5px;
            display: none;
            gap: 5px;
            z-index: 100;
        }
        .toolbar button {
            background: none;
            border: none;
            color: white;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
        }
        .toolbar button:hover { background: #444; }

        .save-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #000;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            top: 70px;
            right: 20px;
            background: #333;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            display: none;
        }
        a { color: var(--accent); }
    </style>
</head>
<body>

    <div class="toolbar" id="toolbar">
        <button onclick="format('bold')">B</button>
        <button onclick="format('italic')">I</button>
        <button onclick="format('underline')">U</button>
        <button onclick="format('insertUnorderedList')">List</button>
        <button onclick="createLink()">Link</button>
    </div>

    <div id="title" contenteditable="true" data-placeholder="Title"></div>
    <div id="content" contenteditable="true" data-placeholder="Type something here..."></div>

    <button class="save-btn" onclick="saveToUrl()">Save to URL</button>
    <div id="toast" class="toast">Link has been copied to clipboard</div>

    <script>
        const titleEl = document.getElementById('title');
        const contentEl = document.getElementById('content');
        const toolbar = document.getElementById('toolbar');

        function format(command) {
            document.execCommand(command, false, null);
        }

        function createLink() {
            const url = prompt("Enter URL:", "https://");
            if (url) document.execCommand('createLink', false, url);
        }

        document.addEventListener('selectionchange', () => {
            const selection = window.getSelection();
            if (selection.toString().length > 0 && !selection.isCollapsed) {
                const range = selection.getRangeAt(0);
                const rect = range.getBoundingClientRect();
                toolbar.style.display = 'flex';
                toolbar.style.top = `${rect.top + window.scrollY - 45}px`;
                toolbar.style.left = `${rect.left + window.scrollX}px`;
            } else {
                toolbar.style.display = 'none';
            }
        });

        function saveToUrl() {
            const data = {
                t: titleEl.innerHTML,
                c: contentEl.innerHTML
            };
            const base64 = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            window.location.hash = base64;

            navigator.clipboard.writeText(window.location.href).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 2000);
            });
        }

        function loadFromUrl() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                try {
                    const decoded = JSON.parse(decodeURIComponent(escape(atob(hash))));
                    titleEl.innerHTML = decoded.t || '';
                    contentEl.innerHTML = decoded.c || '';
                } catch (e) {
                    console.error("Unable to decode =(", e);
                }
            }
        }

        window.addEventListener('load', loadFromUrl);
    </script>
</body>
</html>
